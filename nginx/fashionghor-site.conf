# Fashion Ghor — Nginx site config
# Server: 103.231.238.199 (shared VPS, multiple apps under /var/www/html)
#
# Place at: /etc/nginx/sites-available/fashionghor
# Enable:   sudo ln -s /etc/nginx/sites-available/fashionghor /etc/nginx/sites-enabled/
#           sudo nginx -t && sudo systemctl reload nginx
#
# TLS (run after the first reload above):
#   sudo certbot --nginx -d fashionghor.netspheresolutionsltd.com
#   (certbot rewrites this file in place — adds the 443 block, ssl_* directives,
#    and a :80 → :443 redirect server block, same as the other sites on this box)
#
# Requires apps/api (NestJS) and apps/web (Next.js) running via PM2 — see
# ecosystem.config.js in the repo root. Ports below must match APP_PORT / PORT
# in apps/api/.env and the PM2 env.

upstream fashionghor_api {
    server 127.0.0.1:4000;
    keepalive 32;
}

upstream fashionghor_web {
    server 127.0.0.1:3000;
    keepalive 32;
}

limit_req_zone $binary_remote_addr zone=fashionghor_api:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=fashionghor_auth:10m rate=10r/m;

server {
    listen 80;
    listen [::]:80;
    server_name fashionghor.netspheresolutionsltd.com;

    client_max_body_size 20M;
    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Next.js static assets — hashed filenames, safe to cache forever ─────
    location /_next/static/ {
        proxy_pass http://fashionghor_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Auth endpoints — tighter rate limit (brute-force protection) ───────
    location /api/v1/auth/login {
        limit_req zone=fashionghor_auth burst=5 nodelay;
        proxy_pass http://fashionghor_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Stripe webhook — needs the raw request body, keep unthrottled ──────
    location /api/v1/payments/webhook {
        proxy_pass http://fashionghor_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_request_body on;
    }

    # ── NestJS API ───────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=fashionghor_api burst=20 nodelay;
        proxy_pass http://fashionghor_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        # API responses must never be cached by the browser.
        add_header Cache-Control "no-store, no-cache, must-revalidate, private" always;
        expires off;
    }

    # ── Next.js frontend (SSR) — everything else proxies here ──────────────
    location / {
        proxy_pass http://fashionghor_web;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }

    # ── Misc hardening ──────────────────────────────────────────────────────
    location ~ /\. { deny all; }
}
